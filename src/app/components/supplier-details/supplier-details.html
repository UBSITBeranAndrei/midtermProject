<div class="details-container">
    <h2 class="page-title">Supplier Details</h2>
  
    @if (supplier) {
      <div class="details-form">
  
        <div class="form-grid">
          <div class="form-group">
            <label>ID</label>
            <input type="number" [(ngModel)]="supplier.id" name="id" readonly class="form-input readonly" />
          </div>
          <div class="form-group">
            <label>Supplier Name</label>
            <input type="text" [(ngModel)]="supplier.supplierName" name="supplierName" class="form-input" />
          </div>
          <div class="form-group">
            <label>Contact Person</label>
            <input type="text" [(ngModel)]="supplier.contactPerson" name="contactPerson" class="form-input" />
          </div>
          <div class="form-group">
            <label>Email</label>
            <input type="email" [(ngModel)]="supplier.email" name="email" class="form-input" />
          </div>
          <div class="form-group">
            <label>Phone</label>
            <input type="text" [(ngModel)]="supplier.phone" name="phone" class="form-input" />
          </div>
          <div class="form-group">
            <label>Location</label>
            <input type="text" [(ngModel)]="supplier.location" name="location" class="form-input" />
          </div>
          <div class="form-group">
            <label>Category</label>
            <input type="text" [(ngModel)]="supplier.category" name="category" class="form-input" />
          </div>
          <div class="form-group">
            <label>Status</label>
            <input type="text" [(ngModel)]="supplier.status" name="status" class="form-input" />
          </div>
          <div class="form-group form-full">
            <label>Products Supplied</label>
            <input type="text" [ngModel]="supplier.productsSupplied.join(', ')" (ngModelChange)="supplier.productsSupplied = $event.split(',')" name="productsSupplied" class="form-input" />
            <span class="hint">Separate products with commas</span>
          </div>
        </div>
  
        @if (saveMessage) {
          <p class="save-message">{{ saveMessage }}</p>
        }
  
        <div class="form-actions">
          <button class="btn-back" (click)="goBack()">← Back</button>
          <button class="btn-save" (click)="saveChanges()">💾 Save Changes</button>
        </div>
  
      </div>
    } @else {
      <p class="not-found">Supplier not found.</p>
    }
  </div>
